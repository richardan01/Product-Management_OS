name: Markdown Lint & Template Hygiene

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        run: npx --yes markdownlint-cli@0.39.0 "**/*.md" --ignore node_modules

  placeholder-check:
    name: Placeholder residue check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for [YOUR_NAME] / [YOUR_COMPANY] outside intentional template files
        shell: bash
        run: |
          # Use find to explicitly list only the files we want to check, then grep those.
          # This is more reliable than grep --exclude-dir across different grep versions.
          #
          # Excluded (intentionally use [YOUR_NAME]/[YOUR_COMPANY] as variables or scaffolding):
          #   Agents/, _Registry/, Evals/, Reviews/, Templates/, Workflows/, Projects/,
          #   Knowledge/, Memory/, .claude/, .codex/, examples/, _temp/
          #   Root files: GOALS.md, CLAUDE.md, AGENTS.md, GEMINI.md, README.md,
          #               HOW-IT-WORKS.md, CHANGELOG.md
          #
          # Checked (user-context files where residue indicates incomplete onboarding):
          #   Tasks/, Meetings/, and any other .md files not in the above exclusions.

          echo "Scanning for [YOUR_NAME] or [YOUR_COMPANY] in user-context .md files..."

          FILES=$(find . -name "*.md" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./Agents/*" \
            -not -path "./_Registry/*" \
            -not -path "./Evals/*" \
            -not -path "./Reviews/*" \
            -not -path "./Templates/*" \
            -not -path "./Workflows/*" \
            -not -path "./Projects/*" \
            -not -path "./Knowledge/*" \
            -not -path "./Memory/*" \
            -not -path "./.claude/*" \
            -not -path "./.codex/*" \
            -not -path "./examples/*" \
            -not -path "./_temp/*" \
            -not -name "GOALS.md" \
            -not -name "CLAUDE.md" \
            -not -name "AGENTS.md" \
            -not -name "GEMINI.md" \
            -not -name "README.md" \
            -not -name "HOW-IT-WORKS.md" \
            -not -name "CHANGELOG.md" \
          )

          if [ -z "$FILES" ]; then
            echo "✅ No user-context .md files found to check."
            exit 0
          fi

          MATCHES=$(echo "$FILES" | xargs grep -n '\[YOUR_NAME\]\|\[YOUR_COMPANY\]' 2>/dev/null || true)

          if [ -n "$MATCHES" ]; then
            echo "❌ Template placeholder residue found in user-context files:"
            echo ""
            echo "$MATCHES"
            echo ""
            echo "These files contain [YOUR_NAME] or [YOUR_COMPANY] and are not in the exclusion list."
            echo "Either run onboarding to replace placeholders, or add the file/directory to the"
            echo "exclusion list in .github/workflows/lint.yml if it is intentionally a template."
            exit 1
          else
            echo "✅ No placeholder residue found in user-context files."
          fi
